<div class="h-dvh flex bg-dex-bg">
  <!-- Sidebar -->
  <aside class="w-64 shrink-0 border-r border-white/10 bg-dex-surface flex flex-col">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-dex-gold font-display text-xl">PokéScanner Admin</h1>
    </div>
    <nav class="flex-1 p-4 flex flex-col gap-1">
      <a routerLink="/admin"
         routerLinkActive="bg-dex-accent/20 text-dex-gold"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-dex-text-muted hover:text-dex-text hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
        Dashboard
      </a>
      <a routerLink="/admin/users"
         routerLinkActive="bg-dex-accent/20 text-dex-gold"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-dex-text-muted hover:text-dex-text hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
        </svg>
        Users
      </a>
      <a routerLink="/admin/traces"
         routerLinkActive="bg-dex-accent/20 text-dex-gold"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-dex-text-muted hover:text-dex-text hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5m.75-9 3-3 2.148 2.148A12.061 12.061 0 0 1 16.5 7.605" />
        </svg>
        API Tracing
      </a>
      <a routerLink="/admin/api-test"
         routerLinkActive="bg-dex-accent/20 text-dex-gold"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-dex-text-muted hover:text-dex-text hover:bg-white/5 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.25 9.75 16.5 12l-2.25 2.25m-4.5 0L7.5 12l2.25-2.25M6 20.25h12A2.25 2.25 0 0 0 20.25 18V6A2.25 2.25 0 0 0 18 3.75H6A2.25 2.25 0 0 0 3.75 6v12A2.25 2.25 0 0 0 6 20.25Z" />
        </svg>
        API Testing
      </a>
    </nav>
    <div class="p-4 border-t border-white/10">
      <a routerLink="/" class="flex items-center gap-2 text-dex-text-muted/40 hover:text-dex-text text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Back to app
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet />
  </main>
</div>
